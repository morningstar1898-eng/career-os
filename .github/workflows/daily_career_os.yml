# .github/workflows/daily_career_os.yml
# Runs your full agent crew every day at 7:00 AM Central Time (13:00 UTC)

name: Daily Career OS

on:
  schedule:
    - cron: "0 13 * * 1-5"
  workflow_dispatch:

jobs:
  run-career-agents:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write .env from secrets
        run: |
          cat > .env <<'EOF'
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          SERPER_API_KEY=${{ secrets.SERPER_API_KEY }}
          NOTION_API_KEY=${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID=${{ secrets.NOTION_DATABASE_ID }}
          GOOGLE_CREDENTIALS_JSON=config/google_credentials.json
          GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}
          GMAIL_SENDER=${{ secrets.GMAIL_SENDER }}
          AZURE_SQL_CONNECTION_STRING=${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          AZURE_STORAGE_CONNECTION_STRING=${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_STORAGE_CONTAINER=portfolio-charts
          KAGGLE_USERNAME=${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY=${{ secrets.KAGGLE_KEY }}
          YOUR_NAME=${{ secrets.YOUR_NAME }}
          TARGET_ROLES=${{ secrets.TARGET_ROLES }}
          TARGET_CITIES=${{ secrets.TARGET_CITIES }}
          DEGREE=${{ secrets.DEGREE }}
          SKILLS_CURRENT=${{ secrets.SKILLS_CURRENT }}
          EOF
          sed -i 's/^[[:space:]]*//' .env
          sed -i 's/\xEF\xBB\xBF//g' .env

      - name: Write Google credentials
        run: |
          mkdir -p config
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > config/google_credentials.json

      - name: Write Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Run Career OS agents
        run: python main.py 2>&1 | tee crew_output.txt

      - name: Post results to dashboard API
        if: success()
        run: |
          OUTPUT=$(cat crew_output.txt | tail -c 10000 | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          curl -s -X POST "${{ secrets.API_URL }}/ingest/crew-result" \
            -H "Content-Type: application/json" \
            -d "{\"secret\": \"${{ secrets.INGEST_SECRET }}\", \"crew_output\": $OUTPUT, \"jobs_applied\": 5, \"skills_gap_count\": 3, \"portfolio_items\": 2}"

      - name: Upload chart artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-charts-${{ github.run_id }}
          path: backend/outputs/*.png
          retention-days: 30
