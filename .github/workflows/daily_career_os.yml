# .github/workflows/daily_career_os.yml
# Runs the full agent crew every WEEKDAY morning (Central Time).
# The crew finds jobs, drafts application materials, and prepares a briefing.
# It never submits applications — the owner reviews and applies manually.

name: Daily Career OS

on:
  schedule:
    # Weekdays only (1-5). Several windows (off-peak minutes, clustered in the
    # morning) so GitHub's unreliable scheduler lands one as early as possible.
    # The duplicate-run guard ensures only the FIRST that finds no briefing
    # today runs; the rest skip.
    - cron: "17 12 * * 1-5"   # ~7:17a Central
    - cron: "47 12 * * 1-5"
    - cron: "17 13 * * 1-5"
    - cron: "47 13 * * 1-5"
    - cron: "17 14 * * 1-5"
    - cron: "17 16 * * 1-5"   # afternoon fallbacks
    - cron: "17 18 * * 1-5"
  workflow_dispatch:

concurrency:
  group: career-os-daily
  cancel-in-progress: false

jobs:
  run-career-agents:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need write access so we can push lesson_history.txt back after run
          token: ${{ secrets.GITHUB_TOKEN }}

      # Skip a scheduled run if today's briefing already exists (e.g. a manual
      # trigger already ran). Manual dispatches always run (never skipped).
      - name: Guard against duplicate run
        id: guard
        run: |
          SKIP=false
          if [ "${{ github.event_name }}" = "schedule" ]; then
            CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.CAREER_OS_API_TOKEN }}" \
              "${{ secrets.API_URL }}/briefings/today")
            if [ "$CODE" = "200" ]; then SKIP=true; fi
            echo "Scheduled run — briefing endpoint returned $CODE (skip=$SKIP)"
          fi
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.11
        if: steps.guard.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        if: steps.guard.outputs.skip == 'false'
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Private profile files are NOT committed to the repo — they are written
      # at run time from repository secrets (RESUME_TEXT, LINKEDIN_PROFILE_TEXT).
      - name: Write private profile files from secrets
        if: steps.guard.outputs.skip == 'false'
        env:
          RESUME_TEXT: ${{ secrets.RESUME_TEXT }}
          LINKEDIN_PROFILE_TEXT: ${{ secrets.LINKEDIN_PROFILE_TEXT }}
        run: |
          mkdir -p config
          if [ -n "$RESUME_TEXT" ]; then
            printf '%s' "$RESUME_TEXT" > config/resume.txt
            echo "resume.txt written from secret"
          else
            echo "WARNING: RESUME_TEXT secret not set — agents will run without resume context."
          fi
          if [ -n "$LINKEDIN_PROFILE_TEXT" ]; then
            printf '%s' "$LINKEDIN_PROFILE_TEXT" > config/linkedin_profile.txt
            echo "linkedin_profile.txt written from secret"
          else
            echo "NOTE: LINKEDIN_PROFILE_TEXT secret not set — LinkedIn optimizer will note the missing profile."
          fi

      - name: Write .env from secrets
        if: steps.guard.outputs.skip == 'false'
        run: |
          cat > .env <<'EOF'
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          SERPER_API_KEY=${{ secrets.SERPER_API_KEY }}
          NOTION_API_KEY=${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID=${{ secrets.NOTION_DATABASE_ID }}
          GOOGLE_CREDENTIALS_JSON=config/google_credentials.json
          GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}
          GMAIL_SENDER=${{ secrets.GMAIL_SENDER }}
          AZURE_SQL_CONNECTION_STRING=${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          AZURE_STORAGE_CONNECTION_STRING=${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_STORAGE_CONTAINER=portfolio-charts
          KAGGLE_USERNAME=${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY=${{ secrets.KAGGLE_KEY }}
          YOUR_NAME=${{ secrets.YOUR_NAME }}
          TARGET_ROLES=${{ secrets.TARGET_ROLES }}
          TARGET_CITIES=${{ secrets.TARGET_CITIES }}
          TARGET_COMPANIES=${{ secrets.TARGET_COMPANIES }}
          JOBS_PER_DAY=10
          DEGREE=${{ secrets.DEGREE }}
          SKILLS_CURRENT=${{ secrets.SKILLS_CURRENT }}
          LESSON_HISTORY_PATH=lesson_history.txt
          WEAK_INTERVIEW_CATEGORY=${{ steps.weak_cat.outputs.weak_category }}
          EOF
          sed -i 's/^[[:space:]]*//' .env
          sed -i 's/\xEF\xBB\xBF//g' .env

      - name: Write Google credentials
        if: steps.guard.outputs.skip == 'false'
        run: |
          mkdir -p config
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > config/google_credentials.json

      - name: Write Kaggle credentials
        if: steps.guard.outputs.skip == 'false'
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      # ── Feedback: find weakest interview category from real practice scores ──
      # Queries /interview/history, groups avg score by category, writes the
      # weakest one into WEAK_INTERVIEW_CATEGORY so the tutor and interview coach
      # can prioritize it today.
      - name: Compute weak interview category
        id: weak_cat
        if: steps.guard.outputs.skip == 'false'
        continue-on-error: true
        run: |
          HISTORY=$(curl -s -H "Authorization: Bearer ${{ secrets.CAREER_OS_API_TOKEN }}" \
            "${{ secrets.API_URL }}/interview/history?limit=50" || echo "[]")
          WEAK=$(HISTORY_JSON="$HISTORY" python3 -c "
          import json, os
          try:
              sessions = json.loads(os.environ.get('HISTORY_JSON','[]'))
          except Exception:
              sessions = []
          if not isinstance(sessions, list):
              sessions = []
          scores, counts = {}, {}
          for s in sessions:
              if not isinstance(s, dict):
                  continue
              cat, score = s.get('category',''), s.get('score')
              if cat and score is not None:
                  scores[cat] = scores.get(cat,0) + float(score)
                  counts[cat] = counts.get(cat,0) + 1
          if not scores:
              print('')
          else:
              avgs = {c: scores[c]/counts[c] for c in scores}
              print(min(avgs, key=avgs.get))
          " || echo "")
          echo "weak_category=$WEAK" >> "$GITHUB_OUTPUT"
          echo "Weakest interview category: ${WEAK:-none}"

      # Step-level cap: a hung agent (LLM call stuck without timeout) fails fast
      # here instead of burning the full 150-minute job timeout (seen 2026-07-08).
      - name: Run Career OS agents
        if: steps.guard.outputs.skip == 'false'
        timeout-minutes: 45
        run: python main.py 2>&1 | tee crew_output.txt

      - name: Post results to dashboard API
        if: success() && steps.guard.outputs.skip == 'false'
        run: |
          python3 clean_briefing.py > clean_output.txt
          OUTPUT=$(python3 -c "import json; print(json.dumps(open('clean_output.txt', encoding='utf-8').read()))")
          # Count "Logged N application(s)" lines to report jobs FOUND today
          JOBS_FOUND=$(grep -oP 'Logged \K[0-9]+(?= application)' crew_output.txt | awk '{s+=$1} END {print s+0}')
          curl -s -X POST "${{ secrets.API_URL }}/ingest/crew-result" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CAREER_OS_API_TOKEN }}" \
            -d "{\"secret\": \"${{ secrets.INGEST_SECRET }}\", \"crew_output\": $OUTPUT, \"jobs_found\": ${JOBS_FOUND:-0}, \"skills_gap_count\": 3, \"portfolio_items\": 2}"

      - name: Sync applications to pipeline DB
        if: success() && steps.guard.outputs.skip == 'false'
        continue-on-error: true
        env:
          API_URL: ${{ secrets.API_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          CAREER_OS_API_TOKEN: ${{ secrets.CAREER_OS_API_TOKEN }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: config/google_credentials.json
        run: python3 sync_applications.py

      - name: Send email briefing
        if: success() && steps.guard.outputs.skip == 'false'
        continue-on-error: true
        run: |
          curl -s -X POST "${{ secrets.API_URL }}/email/briefing" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CAREER_OS_API_TOKEN }}" \
            -d '{"secret": "${{ secrets.INGEST_SECRET }}", "to": "${{ secrets.EMAIL_TO }}"}'

      # ── Failure tracking: record failed runs on the dashboard ────────────────
      - name: Report run failure to dashboard
        if: failure() && steps.guard.outputs.skip == 'false'
        continue-on-error: true
        run: |
          TAIL=$(tail -c 400 crew_output.txt 2>/dev/null | python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))" || echo '"(no output captured)"')
          curl -s -X POST "${{ secrets.API_URL }}/ingest/run-failure" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CAREER_OS_API_TOKEN }}" \
            -d "{\"secret\": \"${{ secrets.INGEST_SECRET }}\", \"stage\": \"workflow\", \"trigger\": \"cron\", \"error_message\": $TAIL}"

      # ── Feedback loop: commit today's lesson topic back to the repo ──────────
      # The tutor reads lesson_history.txt at the start of the NEXT run so it
      # never repeats a topic covered in the past 14 days.
      - name: Update lesson history
        if: success() && steps.guard.outputs.skip == 'false'
        continue-on-error: true
        run: |
          # Extract the lesson topic from the crew output (## Today's Focus line)
          TOPIC=$(grep -m1 "## Today's Focus" crew_output.txt | sed 's/## Today'\''s Focus[: ]*//' | tr -d '\r' | head -c 120)
          # Fall back to the first non-empty lesson heading if the exact marker isn't found
          if [ -z "$TOPIC" ]; then
            TOPIC=$(grep -m1 "Today.*Focus\|Today.*Lesson\|Topic:" crew_output.txt | head -c 120)
          fi
          if [ -n "$TOPIC" ]; then
            echo "$(date +%Y-%m-%d) | $TOPIC" >> lesson_history.txt
            # Keep only the last 60 entries so the file stays small
            tail -n 60 lesson_history.txt > lesson_history.tmp && mv lesson_history.tmp lesson_history.txt
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "Career OS Bot"
            git add lesson_history.txt
            git diff --cached --quiet || git commit -m "lesson-history: $(date +%Y-%m-%d)"
            git push
            echo "Lesson history updated: $TOPIC"
          else
            echo "Could not extract lesson topic — history not updated."
          fi
